name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Add deployment steps here based on your hosting provider
      # Example for Render: push to main auto-deploys via Render dashboard
      # Example for Vercel: connect repo in Vercel dashboard for auto-deploy
